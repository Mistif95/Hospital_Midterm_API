<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/icon2.png">
    <title>Staff Scanner</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; background-color: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .header { text-align: center; padding: 20px; }
        #reader { width: 100%; max-width: 100vw; background: black; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .controls { margin-top: 20px; text-align: center; }
        button { padding: 15px 30px; font-size: 18px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; background-color: #007bff; color: white; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-stop { background-color: #dc3545; display: none; }
        #status-card { margin-top: 20px; padding: 15px; border-radius: 10px; width: 90%; max-width: 400px; text-align: center; display: none; background: white; color: black; }
        #action-buttons { display: none; margin-top: 15px; gap: 10px; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

    <div class="header">
        <h2>📷 Asset Delivery Scanner</h2>
        <p style="color: #aaa; margin: 0;">Point camera at the asset's QR tag to verify.</p>
    </div>

    <div id="reader"></div>

    <div class="controls">
        <button id="start-btn" onclick="startScanner()">Start Scanner</button>
        <button id="stop-btn" class="btn-stop" onclick="stopScanner()">Stop Camera</button>
    </div>

    <div id="status-card">
        <h3 id="status-title" style="margin-top: 0;"></h3>
        <p id="status-msg"></p>
        
        <div id="action-buttons"></div>

        <button onclick="resetScanner();" style="width: 100%; padding: 10px; margin-top: 15px; background-color: #333; color: white; border-radius: 8px;">Scan Another</button>
    </div>

<script>
    const API_BASE = 'http://localhost:3000/api';
    let html5QrcodeScanner;

    function startScanner() {
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('stop-btn').style.display = 'inline-block';
        document.getElementById('status-card').style.display = 'none';
        document.getElementById('action-buttons').style.display = 'none';

        html5QrcodeScanner = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };

        html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess)
        .catch(err => {
            showStatus("Camera Error", "Could not access the rear camera.", false);
            resetButtons();
        });
    }

    function stopScanner() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => resetButtons()).catch(err => console.error(err));
        }
    }

    function resetButtons() {
        document.getElementById('start-btn').style.display = 'inline-block';
        document.getElementById('stop-btn').style.display = 'none';
    }

    function resetScanner() {
        document.getElementById('status-card').style.display = 'none';
        startScanner();
    }

    async function onScanSuccess(decodedText) {
        stopScanner(); 
        showStatus("Verifying...", `Checking asset hash...`, true);

        try {
            // 1. Fetch Asset Details
            const res = await fetch(`${API_BASE}/assets/qr/${decodedText}`);
            const data = await res.json();
            
            if (res.ok) {
                const asset = data.data;

                // 2. Logic: If it is In Transit, fetch the Transfer details
                if (asset.status === 'In Transit') {
                    const transferRes = await fetch(`${API_BASE}/transfers/active/${asset.id}`);
                    const transferData = await transferRes.json();
                    
                    if (transferRes.ok) {
                        const transfer = transferData.data;
                        const details = `
                            <strong>Identified:</strong> ${asset.name}<br><br>
                            <strong>Location Origin:</strong> ${transfer.from_ward}<br>
                            <strong>Location Destination:</strong> <span style="color:red; font-size:18px;">${transfer.to_ward}</span>
                        `;
                        showStatus("📦 Arriving Asset", details, true);

                        // Render Buttons
                        const btnContainer = document.getElementById('action-buttons');
                        btnContainer.innerHTML = `
                            <button style="background-color: #28a745; border-radius: 8px; width: 100%;" onclick="confirmItem(${transfer.id})">✅ Confirm Item</button>
                            <button style="background-color: #dc3545; border-radius: 8px; width: 100%;" onclick="wrongLocation()">❌ Wrong Location</button>
                        `;
                        btnContainer.style.display = 'flex';
                    }
                } 
                // Logic: If it's already in use or available
                else {
                    showStatus("✅ Asset Status", `<strong>${asset.name}</strong> <br><br>Current Ward: ${asset.current_ward} <br>Status: <strong>${asset.status}</strong>`, true);
                }
            } else {
                showStatus("❌ Invalid Asset", data.error || "Hash not found.", false);
            }
        } catch (error) {
            showStatus("❌ Failed", "Network error.", false);
        }
    }

    // Triggered by the "Confirm Item" button
    async function confirmItem(transferId) {
        try {
            const res = await fetch(`${API_BASE}/transfers/receive/${transferId}`, { method: 'PUT' });
            if (res.ok) {
                document.getElementById('action-buttons').style.display = 'none';
                showStatus("✅ Success", "Item confirmed! The asset is now <strong>IN USE</strong> at this ward.", true);
            }
        } catch (err) {
            alert("Failed to confirm item.");
        }
    }

    // Triggered by the "Wrong Location" button
    function wrongLocation() {
        document.getElementById('action-buttons').style.display = 'none';
        showStatus("⚠️ Alert", "Do not accept this item. Please instruct the porter to return it to the Origin Location.", false);
    }

    function showStatus(title, msg, isSuccess) {
        const card = document.getElementById('status-card');
        card.style.display = 'block';
        card.style.borderTop = isSuccess ? "5px solid #28a745" : "5px solid #dc3545";
        document.getElementById('status-title').innerText = title;
        document.getElementById('status-msg').innerHTML = msg; // Allowed HTML formatting
    }
</script>

</body>
</html>
